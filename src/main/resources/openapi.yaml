openapi: 3.1.0
info:
  title: Trading API
  description: API for user authentication and stock watchlist management
  version: 1.0.0

servers:
  - url: https://localhost:8080
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        loginTime:
          type: string
          format: date-time
          example: "2026-03-31T15:45:36.374038"
        token:
          type: string
      required:
        - token
        - loginTime

    StockDetails:
      type: object
      properties:
        currentPrice:
          type: number
          format: float
        dailyHigh:
          type: number
          format: float
        dailyLow:
          type: number
          format: float
        volume:
          type: integer
      required:
        - currentPrice
        - dailyHigh
        - dailyLow
        - volume

    WatchlistRequest:
      type: object
      properties:
        stockName:
          type: string
      required:
        - stockName

    YearlyBound:
      type: object
      properties:
        upperBound:
          type: number
          format: double
        lowerBound:
          type: number
          format: double
      required:
        - upperBound
        - lowerBound

    WatchlistStockItem:
      type: object
      properties:
        stockName:
          type: string
        currentPrice:
          type: number
          format: double
        yearlyBound:
          $ref: '#/components/schemas/YearlyBound'
        sentimentIdx:
          type: string
        lastClosedPrice:
          type: number
          format: double
      required:
        - stockName
        - currentPrice
        - yearlyBound
        - lastClosedPrice

    WatchlistResponse:
      type: object
      properties:
        stocks:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistStockItem'
        total:
          type: integer
      required:
        - stocks
        - total

paths:
  /auth/signup:
    post:
      summary: User signup
      tags:
        - Auth
      requestBody:
        description: Signup request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: Signup successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad request

  /auth/login:
    post:
      summary: User login
      tags:
        - Auth
      requestBody:
        description: Login request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /my_trading/watchlist:
    get:
      operationId: getWatchlist
      summary: Get user watchlist
      tags:
        - Trading
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User watchlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        '401':
          description: Unauthorized

  /my_trading/watchlist_details:
    post:
      operationId: getWatchlistDetails
      summary: Get stock details from watchlist
      tags:
        - Trading
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: Stock to fetch details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchlistRequest'
      responses:
        '200':
          description: Stock details response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        '404':
          description: Stock not found
        '401':
          description: Unauthorized

  /my_trading/addToWatchList:
    post:
      operationId: addToWatchList
      summary: Add a stock to the user watchlist
      tags:
        - Trading
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: Stock to add
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchlistRequest'
      responses:
        '200':
          description: Updated watchlist after adding stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized

  /my_trading/removeFromWatchList:
    post:
      operationId: removeFromWatchList
      summary: Remove a stock from the user watchlist
      tags:
        - Trading
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: Stock to remove
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchlistRequest'
      responses:
        '200':
          description: Updated watchlist after removing stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        '400':
          description: Stock not in watchlist or bad request
        '401':
          description: Unauthorized
